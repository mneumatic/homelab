# MongoDB - A scalable, high-performance, open source document-oriented database.

# Usage:
# podman compose -f mongodb.yaml up -d
# Note: .env file needs to be in the same directory as .yaml file

# Feel free to edit to your own needs.

name: mongodb

services:
  mongo:
    image: docker.io/bitnami/mongodb:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGODB_ROOT_PASSWORD: "${MONGODB_ROOT_PASSWORD}"
    volumes:
      - mongodb:/bitnami/mongodb:Z

volumes:
  mongodb:
    name: mongodb
