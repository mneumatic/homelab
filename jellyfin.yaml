# Jellyfin media server

# Usage:
# podman compose -f --in-pod=0 jellyfin.yaml up -d
# Exclude '--in-pod=0' to create pod.
# Note: .env file needs to be in the same directory as .yaml file

name: jellyfin

services:
  jellyfin:
    image: docker.io/jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096/tcp"
      - "7359:7359/udp"
    user: "1000:1000"
    volumes:
      - jellyfin-cache:/cache:Z
      - jellyfin-config:/config:Z
      - jellyfin-media:/media:Z
    networks:
      - jellyfin-net
    labels:
      - io.containers.autoupdate=registry
    # Podman-specific: keep user namespace mapping
    #userns_mode: keep-id

volumes:
  jellyfin-cache:
    name: jellyfin-cache
  jellyfin-config:
    name: jellyfin-config
  jellyfin-media:
    name: jellyfin-media

networks:
  jellyfin-net:
    name: jellyfin-bridge-network
    driver: bridge