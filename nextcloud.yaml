# NextCloud Cloud storage & collaboration

# Usage:
# podman compose -f nextcloud.yaml up -d
# Note: .env file needs to be in the same directory as .yaml file

# Feel free to edit to your own needs.

name: nextcloud

services:
  redis:
    image: redis:latest
    container_name: nextcloud-redis
    restart: unless-stopped
    command: redis-server --requirepass ${NC_REDIS_PASSWORD}
    networks:
      - nextcloud-net
    # Uncomment the following lines if you want/need to disable SELinux.
    #security_opt:
    #  - label=disable

  mariadb:
    image: mariadb:11
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${NC_DB_ROOT_PASSWORD}"
      MARIADB_DATABASE: "nextcloud"
      MARIADB_USER: "${NC_DB_USER}"
      MARIADB_PASSWORD: "${NC_DB_PASSWORD}"
    volumes:
      - mariadb-data:/var/lib/mysql:Z
    networks:
      - nextcloud-net
    # Uncomment the following lines if you want/need to disable SELinux.
    #security_opt:
    #  - label=disable

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: "${NC_DB_USER}"
      MYSQL_PASSWORD: "${NC_DB_PASSWORD}"
      MYSQL_HOST: nextcloud-db
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PASSWORD: "${NC_REDIS_PASSWORD}"
      NEXTCLOUD_ADMIN_USER: "${NC_ADMIN_USER}"
      NEXTCLOUD_ADMIN_PASSWORD: "${NC_ADMIN_PASSWORD}"
      TRUSTED_PROXIES: "127.0.0.1"
      OVERWRITEPROTOCOL: "http"
      OVERWRITEHOST: "${NC_DOMAIN}"
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost,${NC_DOMAIN}"
      NEXTCLOUD_FFMPEG_PATH: "/usr/bin/ffmpeg"
    volumes:
      - nextcloud:/var/www/html:Z
    networks:
      - nextcloud-net
    depends_on:
      - mariadb
      - redis
    # Uncomment the following lines if you want/need to disable SELinux.
    #security_opt:
    #  - label=disable

volumes:
  mariadb-data:
    name: nextcloud-db
  nextcloud:
    name: nextcloud

networks:
  nextcloud-net:
    name: nextcloud-bridge-network
    driver: bridge
