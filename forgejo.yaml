# Forgejo - A simple, self-hosted project management tool

# Usage:
# podman compose -f forgejo.yaml up -d
# Note: .env file needs to be in the same directory as .yaml file

# Feel free to edit to your own needs.

name: forgejo

services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    shm_size: 256mb  # Prevents shared memory crashes
    environment:
      POSTGRES_USER: "${FORGEJO_DB_USER}"
      POSTGRES_PASSWORD: "${FORGEJO_DB_PASSWORD}"
      POSTGRES_DB: "forgejo"
    volumes:
      - postgres-data:/var/lib/postgresql:Z
    networks:
      - forgejo-net
    # Uncomment the following lines if you want/need to disable SELinux.
    #security_opt:
    #  - label=disable
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d forgejo"]
      interval: 5s
      timeout: 5s
      retries: 5

  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      FORGEJO__server__PROTOCOL: http
      FORGEJO__server__DOMAIN: "${FORGEJO_DOMAIN}"
      FORGEJO__server__ROOT_URL: "${FORGEJO_ROOT_URL}"
      FORGEJO__server__HTTP_ADDR: 0.0.0.0
      FORGEJO__server__HTTP_PORT: "3000"
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: postgres:5432
      FORGEJO__server__SSH_PORT: "2222"
      FORGEJO__server__SSH_DOMAIN: "${FORGEJO_DOMAIN}"
      FORGEJO__database__NAME: "forgejo"
      FORGEJO__database__USER: "${FORGEJO_DB_USER}"
      FORGEJO__database__PASSWD: "${FORGEJO_DB_PASSWORD}"
    volumes:
      - forgejo-data:/data:Z
    networks:
      - forgejo-net
    depends_on:
      postgres:
        condition: service_healthy  # Wait for Postgres healthcheck
    # Uncomment the following lines if you want/need to disable SELinux.
    #security_opt:
    #  - label=disable

volumes:
  postgres-data:
    name: forgejo-db
  forgejo-data:
    name: forgejo-data

networks:
  forgejo-net:
    name: forgejo-bridge-network
    driver: bridge
