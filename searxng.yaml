# Podman Compose file for SearXNG search engine

# Usage:
# podman compose -f searxng.yaml up -d
# Note: .env file needs to be in the same directory as .yaml file

# Feel free to edit to your own needs.

name: searxng

services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - searxng:/etc/searxng:Z
      - searxng:/var/cache/searxng:Z

volumes:
  searxng:
    name: searxng
